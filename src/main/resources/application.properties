# Application
spring.application.name=hiberadar

# Server
# Railway/Render gibi platformlar PORT env değişkeni verir. Localde 8080 çalışır.
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# PostgreSQL datasource
# Localde varsayılan değerler çalışır; canlıda Railway env değişkenleriyle override edilir.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hiberadar}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:INFO}

# JWT
# Canlıda mutlaka güçlü ve uzun bir APP_JWT_SECRET ver.
app.jwt.secret=${APP_JWT_SECRET:hiberadar-super-secret-key-hiberadar-super-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:21600000}

# CORS
# Local + canlı frontend originleri. Canlıda APP_CORS_ALLOWED_ORIGINS ile Netlify URL'i verilecek.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

# Uploads
app.upload.base-dir=${APP_UPLOAD_BASE_DIR:uploads}
app.upload.institutions-dir=institutions
app.upload.firm-logos-dir=firm-logos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Ingest scheduler
app.ingest.cron=${APP_INGEST_CRON:0 0 */6 * * *}

# Demo grants seed
# İlk canlı demo için true kalabilir. Gerçek kullanımda false yapılması daha doğru olur.
app.seed-demo-data=${APP_SEED_DEMO_DATA:true}
